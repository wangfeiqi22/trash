server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_customer_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-ttl: 15m
  refresh-token-ttl: 7d
  issuer: smart-waste-system

ai:
  enabled: true
  provider: mock
  api-key: ${AI_API_KEY:}
  model: gpt-3.5-turbo
  endpoint: ${AI_ENDPOINT:}

logging:
  level:
    com.renewable.ai: DEBUG
    org.springframework.web: INFO
